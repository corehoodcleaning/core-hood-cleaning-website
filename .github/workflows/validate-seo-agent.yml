name: Validate SEO Agent Branch

on:
  push:
    branches:
      - 'seo-agent/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate seo-config.json
        run: |
          python3 << 'PYEOF'
          import json, sys
          with open('src/seo-config.json') as f:
              config = json.load(f)
          required = ['homepage','about','blog','hood-cleaning','filter-exchange','nfpa-inspection','locations']
          errors = []
          for key in required:
              if key not in config:
                  errors.append('Missing key: ' + key)
                  continue
              if 'title' not in config[key]:
                  errors.append('Missing title in ' + key)
              if 'description' not in config[key]:
                  errors.append('Missing description in ' + key)
              t = config[key].get('title', '')
              d = config[key].get('description', '')
              if not (10 <= len(t) <= 70):
                  errors.append(key + ' title length ' + str(len(t)) + ' out of range 10-70: ' + t)
              if not (50 <= len(d) <= 170):
                  errors.append(key + ' description length ' + str(len(d)) + ' out of range 50-170: ' + d)
          if errors:
              for e in errors:
                  print('ERROR: ' + e)
              sys.exit(1)
          print('seo-config.json is valid')
          PYEOF

      - name: Build
        run: npm run build

      - name: Auto-merge to main if build passes
        if: success()
        run: |
          git config user.email "seo-agent@corehoodcleaning.com"
          git config user.name "SEO Agent"
          git fetch origin main
          git checkout main
          git merge --no-ff ${{ github.ref_name }} -m "auto-merge: ${{ github.ref_name }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
